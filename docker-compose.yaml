services:
  db:
    image: docker.io/postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sr_barbara
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: srbarbaradb
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./db/sentences_view.sql:/docker-entrypoint-initdb.d/03-sentences_view.sql
      - postgres_data:/var/lib/postgresql/data

  # NEW: Export service
  export:
    build:
      context: ./scripts
      dockerfile: Dockerfile.export
    environment:
      DB_HOST: db
      DB_NAME: sr_barbara
      DB_USER: postgres
      DB_PASSWORD: srbarbaradb
    volumes:
      - ./assets/data:/output
    depends_on:
      - db
    command: python export_sentences.py

  # OPTIONAL: Adminer if you want to poke around while developing
  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data: